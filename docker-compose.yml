version: '3.8'

services:
  redroid:
    image: redroid/redroid:12.0.0_64only-latest
    container_name: redroid-pinterest
    privileged: true
    ports:
      - "5555:5555"
    volumes:
      - ./data:/data
    command: androidboot.use_memfd=1
    restart: unless-stopped
    stdin_open: true
    tty: true
